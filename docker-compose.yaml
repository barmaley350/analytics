networks:
  internal-net:

volumes:
  analytics-clickhouse-data-volume:
  analytics-clickhouse-logs-volume:
  analytics-smtp4dev-volume:

services:
  # ----------------------------------------------------------------------------
  # jupyter
  # ----------------------------------------------------------------------------
  service.jupyter:
    build:
      context: .
      dockerfile: ./services/jupyter/Dockerfile
    ports:
      - 8888:8888      
    volumes:
      - ./services/jupyter/notebooks:/home/jovyan/work/notebooks
      - ./db:/home/jovyan/work/db
    restart: unless-stopped
    networks:
      - internal-net

  # ----------------------------------------------------------------------------
  # apache superset
  # ----------------------------------------------------------------------------
  service.superset:
    build:
      context: .
      dockerfile: ./services/superset/Dockerfile
    ports:
      - 8088:8088
    volumes:
      - ./services/superset/data:/app/superset_home
      - ./db:/app/database
    restart: unless-stopped
    networks:
      - internal-net
 
  # ----------------------------------------------------------------------------
  # database
  # ----------------------------------------------------------------------------
  service.db_postgres:
    image: postgres
    ports:
      - 5432:5432
    volumes:
      - ./services/postgres/db:/var/lib/postgresql/18/docker
    env_file:
      - ./services/postgres/.env
    restart: unless-stopped
    networks:
      - internal-net

  # ----------------------------------------------------------------------------
  # smtp4dev
  # ----------------------------------------------------------------------------
  service.smtp4dev:
    image: rnwood/smtp4dev:prerelease
    ports:
      - 5000:80
      - 2525:25
      - 110:110
    volumes:
      - analytics-smtp4dev-volume:/smtp4dev
    restart: unless-stopped
    networks:
      - internal-net  

  # ----------------------------------------------------------------------------
  # ClickHouse
  # ----------------------------------------------------------------------------
  service.db_clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
    env_file:
      - ./services/clickhouse/.env
    volumes:
      - analytics-clickhouse-data-volume:/var/lib/clickhouse
      - analytics-clickhouse-logs-volume:/var/log/clickhouse-server   
    restart: unless-stopped
    networks:
      - internal-net      
